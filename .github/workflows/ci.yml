name: ci

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref makes the in-flight run irrelevant. Cancel it
# rather than paying for a result nobody will read. Never cancel on main:
# those runs are the record of what actually landed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      # Installs the exact toolchain pinned in mise.toml, so CI and a laptop
      # resolve from one file and cannot drift.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Lint
        run: mise run lint

      - name: Test
        run: mise run test

  ocr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # OCR is the one feature that links C: Tesseract + Leptonica + the English
      # traineddata. Installed here (not via mise) because they are system C
      # libraries, mirroring how a user building `-F ocr` provisions them.
      - name: Install Tesseract and Leptonica
        run: |
          sudo apt-get update
          sudo apt-get install -y libtesseract-dev libleptonica-dev tesseract-ocr-eng clang

      - name: Lint (ocr feature)
        run: mise run lint-ocr

      - name: Test (ocr feature)
        run: mise run test-ocr
