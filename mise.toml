[tools]
# `components` is load-bearing, not decoration. Locally mise installs a full
# Rust distribution that already ships rustfmt and clippy, but in CI
# jdx/mise-action delegates to rustup, which installs the minimal profile
# without them -- so `mise run lint` passed on a laptop and failed on the
# runner with "cargo-fmt is not installed". Naming them here keeps the two
# environments resolving from one file, which is the point of mise-first.
rust = { version = "1.97.1", components = "rustfmt,clippy" }
"cargo:cargo-deny" = "0.20.2"

[tasks.build]
run = "cargo build --workspace"

[tasks.test]
run = "cargo test --workspace"

[tasks.lint]
run = ["cargo fmt --all -- --check",
       "cargo clippy --workspace --all-targets -- -D warnings"]

[tasks.convert]
run = "cargo run -p kasane-cli --"
